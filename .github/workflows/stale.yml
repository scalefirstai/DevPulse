name: Stale Issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 7 days if no further
            activity occurs. If this issue is still relevant, please leave a
            comment or remove the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 7 days if no
            further activity occurs. If this PR is still relevant, please leave
            a comment or remove the stale label.
          close-issue-message: >
            This issue was closed because it has been stale for 7 days with no
            activity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            This pull request was closed because it has been stale for 7 days
            with no activity. Feel free to reopen if this is still relevant.
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: "pinned,security,good first issue"
          exempt-pr-labels: "pinned,security"
          stale-issue-label: "stale"
          stale-pr-label: "stale"
