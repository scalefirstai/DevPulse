server:
  image:
    repository: ghcr.io/devpulse/server
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NODE_ENV: production
    PORT: "4000"

dashboard:
  image:
    repository: ghcr.io/devpulse/dashboard
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  auth:
    database: devpulse
    username: devpulse
    existingSecret: devpulse-db-secret
    secretKey: password

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  host: devpulse.example.com
  tls:
    enabled: false
    secretName: devpulse-tls
  annotations: {}
